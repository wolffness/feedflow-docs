backend:
  name: github
  repo: wolffness/feedflow-docs
  branch: main
  base_url: https://docs.feed-flow.app
  auth_endpoint: /api/auth

site_url: https://docs.feed-flow.app
display_url: https://docs.feed-flow.app
logo_url: https://feed-flow.app/static/img/logo-feedflow-dark.svg

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

slug:
  encoding: "unicode"
  clean_accents: true

locale: "pt"

collections:
  - name: "getting-started"
    label: "Primeiros Passos"
    folder: "src/content/docs/getting-started"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Descricao", name: "description", widget: "text" }
      - { label: "Conteudo", name: "body", widget: "markdown" }

  - name: "platform-setup"
    label: "Plataformas"
    folder: "src/content/docs/platform-setup"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Descricao", name: "description", widget: "text" }
      - { label: "Conteudo", name: "body", widget: "markdown" }

  - name: "features"
    label: "Funcionalidades"
    folder: "src/content/docs/features"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Descricao", name: "description", widget: "text" }
      - { label: "Conteudo", name: "body", widget: "markdown" }

  - name: "guides"
    label: "Guias"
    folder: "src/content/docs/guides"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Descricao", name: "description", widget: "text" }
      - { label: "Conteudo", name: "body", widget: "markdown" }

  - name: "reference"
    label: "Referência"
    files:
      - label: "FAQ"
        name: "faq"
        file: "src/content/docs/faq.mdx"
        fields:
          - { label: "Titulo", name: "title", widget: "string" }
          - { label: "Descricao", name: "description", widget: "text" }
          - { label: "Conteudo", name: "body", widget: "markdown" }
      - label: "Troubleshooting"
        name: "troubleshooting"
        file: "src/content/docs/troubleshooting.mdx"
        fields:
          - { label: "Titulo", name: "title", widget: "string" }
          - { label: "Descricao", name: "description", widget: "text" }
          - { label: "Conteudo", name: "body", widget: "markdown" }
      - label: "Glossário"
        name: "glossary"
        file: "src/content/docs/glossary.mdx"
        fields:
          - { label: "Titulo", name: "title", widget: "string" }
          - { label: "Descricao", name: "description", widget: "text" }
          - { label: "Conteudo", name: "body", widget: "markdown" }
      - label: "Novidades"
        name: "changelog"
        file: "src/content/docs/changelog.mdx"
        fields:
          - { label: "Titulo", name: "title", widget: "string" }
          - { label: "Descricao", name: "description", widget: "text" }
          - { label: "Conteudo", name: "body", widget: "markdown" }
